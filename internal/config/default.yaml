# =============================================================================
# 柠枺镜像 (Lemwood Mirror) 配置文件
# YAML 格式，支持注释。后台保存时会保留本模板结构并回填最新配置值。
# API 端点格式: /api/v2/{resource}，详见 API_DOCS.md
# =============================================================================

# -----------------------------------------------------------------------------
# 服务器设置
# -----------------------------------------------------------------------------

# 服务器监听地址（留空则监听所有网络接口）
server_address: ""

# 服务器监听端口（默认 8080）
server_port: 8080

# -----------------------------------------------------------------------------
# 扫描与同步设置
# -----------------------------------------------------------------------------

# 定时扫描 cron 表达式（分钟粒度，默认 */10 * * * * 即每 10 分钟）
check_cron: "*/10 * * * *"

# Release 资源存储目录（相对项目根目录，默认 download）
storage_path: "download"

# 单文件下载超时（分钟），Git 镜像同步也复用此超时（默认 40）
download_timeout_minutes: 40

# 同时下载的最大并发数（默认 3）
concurrent_downloads: 3

# -----------------------------------------------------------------------------
# GitHub 设置
# -----------------------------------------------------------------------------

# GitHub Personal Access Token，可留空。
# 也支持通过环境变量 GITHUB_TOKEN 覆盖（环境变量优先级更高）。
# 未配置 Token 时会受到 GitHub API 每分钟 60 次的请求限制。
github_token: ""

# -----------------------------------------------------------------------------
# 下载与代理设置
# -----------------------------------------------------------------------------

# 对外下载地址基准 URL（为空时自动回退到 server_address）。
# 生成的下载链接和 API 响应中的 URL 均基于此地址。
download_url_base: ""

# HTTP/HTTPS 代理地址（用于 GitHub API 请求，留空则不使用代理）
proxy_url: ""

# 资源下载专用代理（用于 GitHub Release Assets 下载，留空则回退到 proxy_url）
asset_proxy_url: ""

# Xget 加速服务域名（第三方 GitHub 下载加速）
xget_domain: "https://xget.xi-xu.me"

# 是否启用 Xget 加速（默认 true）
xget_enabled: true

# -----------------------------------------------------------------------------
# 管理后台设置
# -----------------------------------------------------------------------------

# 是否启用管理后台（设为 false 将禁用所有 /api/v2/admin/* 端点及管理页面）
admin_enabled: true

# 管理员用户名
admin_user: "admin"

# 管理员密码（存储为 bcrypt 哈希值，明文密码仅在首次配置时输入）
admin_password: "$2a$04$UsOkJmLf1nYOQ7rDY4Pp3.3ou68RFHdzbfR3x4HSNZgqdDA7bJnay"

# 登录失败最大重试次数，超过后锁定 IP（默认 10）
admin_max_retries: 10

# 登录锁定持续时间（秒，默认 120）
admin_lock_duration: 120

# -----------------------------------------------------------------------------
# 两步验证 (TOTP) 设置
# -----------------------------------------------------------------------------

# 是否启用 TOTP 两步验证（需配合 Google Authenticator 等应用使用）
two_factor_enabled: false

# TOTP 密钥（Base32 编码，启用两步验证后自动生成）
two_factor_secret: ""

# -----------------------------------------------------------------------------
# 极验验证码设置
# -----------------------------------------------------------------------------

# 是否启用极验验证码（启用后下载前需要通过验证码验证）
captcha_enabled: false

# 极验验证码 App ID（从极验管理后台获取）
captcha_app_id: ""

# 极验验证码 Secret Key（从极验管理后台获取，用于服务端二次验证）
captcha_secret_key: ""

# -----------------------------------------------------------------------------
# 流量防刷与黑名单设置
# -----------------------------------------------------------------------------

# 单 IP 每日下载流量上限（GB），设为 0 表示不限制，负值自动修正为 5GB
traffic_limit_gb: 0

# 被封禁 IP 的记录文件路径（默认 banned_ips.txt）
ban_record_file: "banned_ips.txt"

# 外部黑名单同步源 URL（定期拉取并合并到本地黑名单）
external_blacklist_url: "https://bcr.pbh-btn.ghorg.ghostchu-services.top/combine/all.txt"

# 误封申诉联系方式（会在封禁提示中展示给用户）
appeal_contact: "QQ群 https://qm.qq.com/q/FOGt99aayY"

# -----------------------------------------------------------------------------
# MySQL 数据库设置（可选）
# -----------------------------------------------------------------------------
# 默认使用 SQLite，配置 MySQL 后将自动切换并可选择迁移数据。

# MySQL 主机地址（留空则使用 SQLite）
mysql_host: ""

# MySQL 端口（默认 3306）
mysql_port: 3306

# MySQL 用户名
mysql_user: ""

# MySQL 密码
mysql_password: ""

# MySQL 数据库名称
mysql_database: ""

# 是否启用从 SQLite 到 MySQL 的自动数据迁移
mysql_migration: false

# -----------------------------------------------------------------------------
# 自更新设置
# -----------------------------------------------------------------------------

# 是否启用自更新功能
self_update_enabled: false

# 自更新源仓库 URL（GitHub 仓库地址，留空则使用默认源）
self_update_repo_url: ""

# 更新检查通道: notify（仅通知）、release（稳定版）、preview（预览版）
self_update_channel: "notify"

# 自更新检查的 cron 表达式（留空则使用默认检查间隔）
self_update_check_cron: ""

# 更新完成后是否自动重启服务
self_update_auto_restart: false

# -----------------------------------------------------------------------------
# 启动器列表
# -----------------------------------------------------------------------------
# 每个启动器定义一个同步源，支持以下同步模式 (mode):
#   - release: 仅同步 GitHub Release 资源文件
#   - clone:   仅同步 Git 裸仓库镜像到 repo/{name}.git
#   - all:     同时同步 Release 资源和 Git 镜像
#
# 字段说明:
#   name              - 启动器标识（用于 URL 路径和目录名）
#   source_url        - GitHub 仓库地址或组织地址
#   repo_selector     - 仓库筛选关键词（组织模式下按名称过滤，留空则同步全部）
#   mode              - 同步模式: release / clone / all
#   include_prerelease - 是否包含预发布版本
#   max_versions      - 最大保留版本数（0 或负值默认为 3）
launchers:
  - name: "mirror"
    source_url: "https://github.com/ningzestudio/lemwood-mirror"
    repo_selector: ""
    mode: "all"
    include_prerelease: true
    max_versions: 0
